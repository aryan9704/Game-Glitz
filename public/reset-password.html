  <header id="glitz-nav"></header>
  <main id="rp-main" data-reveal="up">
    <form class="rp-card glass-card" id="resetForm" novalidate data-reveal="scale" data-glow data-gradient-border>
      <h1>Reset your password</h1>
      <p class="lead">Pick a new password (8+ chars, with uppercase, lowercase, and a number).</p>

        <label for="rp-confirm">Confirm new password</label>
        <input id="rp-confirm" class="form-input" name="confirm" type="password" autocomplete="new-password" required minlength="8" />
      </div>
      <button type="submit" class="rp-submit btn btn-primary" id="rpSubmit" data-magnetic data-ripple>Set new password</button>
      <div class="rp-msg ggs-6b99de8b69" id="rpMsg" role="status"></div>
