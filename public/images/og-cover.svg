<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B5EA7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7B5EA7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spotlight)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="160" fill="none" stroke="rgba(123,94,167,0.15)" stroke-width="1"/>
  <circle cx="1050" cy="120" r="100" fill="none" stroke="rgba(59,130,246,0.1)" stroke-width="1"/>
  <circle cx="180" cy="500" r="120" fill="none" stroke="rgba(123,94,167,0.1)" stroke-width="1"/>
  
  <!-- Controller icon (geometric) -->
  <g transform="translate(140, 200)" filter="url(#glow)">
    <rect x="0" y="20" width="120" height="70" rx="35" fill="url(#brand)" opacity="0.9"/>
    <rect x="15" y="38" width="8" height="24" rx="2" fill="white" opacity="0.9"/>
    <rect x="7" y="46" width="24" height="8" rx="2" fill="white" opacity="0.9"/>
    <circle cx="92" cy="46" r="5" fill="white" opacity="0.7"/>
    <circle cx="104" cy="54" r="5" fill="white" opacity="0.7"/>
    <circle cx="80" cy="54" r="5" fill="white" opacity="0.7"/>
    <circle cx="92" cy="62" r="5" fill="white" opacity="0.7"/>
    <rect x="46" y="36" width="28" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="46" y="44" width="20" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Logo text -->
  <text x="140" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="white">Game</text>
  <text x="140" y="430" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="72" font-weight="900" letter-spacing="-2" fill="url(#brand)">Glitz</text>
  
  <!-- Tagline -->
  <text x="140" y="490" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="24" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">10,000+ Games  ·  5M+ Players  ·  150+ Countries</text>
  
  <!-- Right side stats -->
  <g transform="translate(700, 160)">
    <rect width="420" height="310" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    
    <!-- Stat 1 -->
    <text x="40" y="70" font-family="'Inter', sans-serif" font-size="48" font-weight="800" fill="url(#brand)">10K+</text>
    <text x="40" y="98" font-family="'Inter', sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">Games Available</text>
    
    <!-- Stat 2 -->
    <text x="40" y="165" font-family="'Inter', sans-serif" font-size="48" font-weight="800" fill="url(#brand)">5M+</text>
    <text x="40" y="193" font-family="'Inter', sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">Active Players</text>
    
    <!-- Stat 3 -->
    <text x="40" y="260" font-family="'Inter', sans-serif" font-size="48" font-weight="800" fill="url(#brand)">4.9★</text>
    <text x="40" y="288" font-family="'Inter', sans-serif" font-size="16" fill="rgba(255,255,255,0.5)">Player Rating</text>
    
    <!-- Dividers -->
    <line x1="40" y1="120" x2="380" y2="120" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <line x1="40" y1="215" x2="380" y2="215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="url(#brand)" opacity="0.6"/>
  <text x="600" y="616" text-anchor="middle" font-family="'Inter', sans-serif" font-size="14" fill="rgba(255,255,255,0.8)" letter-spacing="2">GAMEGLITZ.COM</text>
</svg>